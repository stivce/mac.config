---
- name: Ensure dockutil is installed
  community.general.homebrew:
    name: dockutil
    state: present
  tags:
    - macos-defaults

- name: Set dockutil binary path
  ansible.builtin.set_fact:
    dockutil_bin: "{{ '/opt/homebrew/bin/dockutil' if ansible_architecture == 'arm64' else '/usr/local/bin/dockutil' }}"
  tags:
    - macos-defaults

- name: Apply macOS defaults
  community.general.osx_defaults:
    domain: "{{ item.domain }}"
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
    state: present
  loop: "{{ macos_defaults }}"
  loop_control:
    label: "{{ item.domain }} {{ item.key }}"
  become: false
  notify:
    - Restart Dock
    - Restart Finder
  tags:
    - macos-defaults

- name: Clear all dock apps
  ansible.builtin.shell:
    cmd: defaults write com.apple.dock persistent-apps -array && /usr/bin/killall Dock
  changed_when: true
  become: false
  tags:
    - macos-defaults

- name: Ensure Communication stack folder exists
  when: dock_stack_path is defined
  ansible.builtin.file:
    path: "{{ dock_stack_path }}"
    state: directory
    mode: '0755'
  become: false
  tags:
    - macos-defaults

- name: Add apps to communication stack folder
  when: dock_stack_path is defined
  ansible.builtin.shell:
    cmd: |
      STACK_PATH="{{ dock_stack_path }}"
      mkdir -p "$STACK_PATH"
      find "$STACK_PATH" -maxdepth 1 -type l -name "*.app" -delete
      {% for app in dock_communication_apps %}
      ln -sf "/Applications/{{ app }}" "$STACK_PATH/"
      {% endfor %}
  become: false
  changed_when: true
  tags:
    - macos-defaults

- name: Add communication stack to Dock
  when: dock_stack_path is defined
  ansible.builtin.shell:
    cmd: "{{ dockutil_bin }} --add '{{ dock_stack_path }}' --display stack --position end --no-restart"
  become: false
  changed_when: true
  tags:
    - macos-defaults

- name: Ensure Browsers stack folder exists
  when: dock_browser_stack_path is defined
  ansible.builtin.file:
    path: "{{ dock_browser_stack_path }}"
    state: directory
    mode: '0755'
  become: false
  tags:
    - macos-defaults

- name: Add apps to browsers stack folder
  when: dock_browser_stack_path is defined
  ansible.builtin.shell:
    cmd: |
      STACK_PATH="{{ dock_browser_stack_path }}"
      mkdir -p "$STACK_PATH"
      find "$STACK_PATH" -maxdepth 1 -type l -name "*.app" -delete
      {% for app in dock_browser_apps %}
      ln -sf "/Applications/{{ app }}" "$STACK_PATH/"
      {% endfor %}
  become: false
  changed_when: true
  tags:
    - macos-defaults

- name: Add browsers stack to Dock
  when: dock_browser_stack_path is defined
  ansible.builtin.shell:
    cmd: "{{ dockutil_bin }} --add '{{ dock_browser_stack_path }}' --display stack --position beginning --no-restart"
  become: false
  changed_when: true
  tags:
    - macos-defaults

- name: Add Downloads stack to dock
  when: dock_downloads_path is defined
  ansible.builtin.shell:
    cmd: "{{ dockutil_bin }} --add '{{ dock_downloads_path }}' --display stack --view fan --sort dateadded --position end --no-restart"
  become: false
  changed_when: true
  tags:
    - macos-defaults

- name: Add dock apps
  when: dock_apps | length > 0
  ansible.builtin.shell:
    cmd: |
      for app in {{ dock_apps | map('quote') | join(' ') }}; do
        if [[ "$app" == *"Dock Stacks"* ]]; then
          {{ dockutil_bin }} --add "$app" --display stack --no-restart
        else
          {{ dockutil_bin }} --add "$app" --no-restart
        fi
      done
  become: false
  changed_when: true
  register: dock_apps_added
  tags:
    - macos-defaults

- name: Restart Dock
  ansible.builtin.command: /usr/bin/killall Dock
  changed_when: true
  become: false
  tags:
    - macos-defaults

- name: Restart Control Center
  ansible.builtin.command: /usr/bin/killall ControlCenter
  changed_when: true
  become: false
  tags:
    - macos-defaults

- name: Restart Notification Center
  ansible.builtin.command: /usr/bin/killall NotificationCenter
  changed_when: true
  become: false
  tags:
    - macos-defaults

- name: Restart SystemUIServer
  ansible.builtin.command: /usr/bin/killall SystemUIServer
  changed_when: true
  become: false
  tags:
    - macos-defaults

- name: Disable Gatekeeper (optional)
  ansible.builtin.command: spctl --master-disable
  changed_when: false
  become: true
  when: disable_gatekeeper | default(false) | bool
  tags:
    - macos-defaults
    - never
