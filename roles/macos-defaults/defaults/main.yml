---
dock_apps: []

dock_stacks_base_path: "{{ lookup('env', 'HOME') }}/DockStacks"
dock_stack_path: "{{ dock_stacks_base_path }}/Communication"
dock_browser_stack_path: "{{ dock_stacks_base_path }}/Browsers"
dock_downloads_path: "{{ lookup('env', 'HOME') }}/Downloads"

dock_communication_apps:
  - "WhatsApp.app"
  - "Telegram.app"

dock_browser_apps:
  - "Zen.app"
  - "Arc.app"

macos_defaults:
  # Dock
  - domain: com.apple.dock
    key: autohide
    type: bool
    value: true
  - domain: com.apple.dock
    key: autohide-delay
    type: float
    value: 0.0
  - domain: com.apple.dock
    key: autohide-time-modifier
    type: float
    value: 0.0
  - domain: com.apple.dock
    key: tilesize
    type: int
    value: 50
  - domain: com.apple.dock
    key: magnification
    type: bool
    value: true
  - domain: com.apple.dock
    key: magnify
    type: int
    value: 70
  - domain: com.apple.dock
    key: largesize
    type: int
    value: 70
  - domain: com.apple.dock
    key: show-recents
    type: bool
    value: false
  - domain: com.apple.dock
    key: minimize-to-application
    type: bool
    value: true
  - domain: com.apple.dock
    key: launchanim
    type: bool
    value: false
  - domain: com.apple.dock
    key: orientation
    type: string
    value: "left"
  - domain: com.apple.dock
    key: persistent-others
    type: array
    value: []

  # Finder
  - domain: com.apple.finder
    key: AppleShowAllFiles
    type: bool
    value: true
  - domain: com.apple.finder
    key: ShowPathbar
    type: bool
    value: true
  - domain: com.apple.finder
    key: ShowStatusBar
    type: bool
    value: true
  - domain: com.apple.finder
    key: FXPreferredViewStyle
    type: string
    value: "Nlsv"

  - domain: NSGlobalDomain
    key: com.apple.Finder.FXPreferredViewStyle
    type: string
    value: "Nlsv"
  - domain: com.apple.finder
    key: FXDefaultSearchScope
    type: string
    value: "SCcf"
  - domain: com.apple.finder
    key: FXEnableExtensionChangeWarning
    type: bool
    value: false
  - domain: com.apple.finder
    key: _FXShowPosixPathInTitle
    type: bool
    value: true

  # Global / NSGlobalDomain
  - domain: NSGlobalDomain
    key: AppleShowAllExtensions
    type: bool
    value: true
  - domain: NSGlobalDomain
    key: _HIHideMenuBar
    type: bool
    value: true
  
  - domain: NSGlobalDomain
    key: NSAutomaticSpellingCorrectionEnabled
    type: bool
    value: false
  - domain: NSGlobalDomain
    key: NSAutomaticCapitalizationEnabled
    type: bool
    value: false
  - domain: NSGlobalDomain
    key: NSAutomaticPeriodSubstitutionEnabled
    type: bool
    value: false
  - domain: NSGlobalDomain
    key: NSAutomaticDashSubstitutionEnabled
    type: bool
    value: false
  - domain: NSGlobalDomain
    key: NSAutomaticQuoteSubstitutionEnabled
    type: bool
    value: false
  - domain: NSGlobalDomain
    key: KeyRepeat
    type: int
    value: 2
  - domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: int
    value: 15
  - domain: NSGlobalDomain
    key: AppleInterfaceStyle
    type: string
    value: "Dark"

  # Trackpad
  - domain: com.apple.driver.AppleBluetoothMultitouch.trackpad
    key: Clicking
    type: int
    value: 1
  - domain: com.apple.AppleMultitouchTrackpad
    key: Clicking
    type: int
    value: 1

  # Screenshots
  - domain: com.apple.screencapture
    key: location
    type: string
    value: "/Users/{{ user }}/Pictures/Screenshots"
  - domain: com.apple.screencapture
    key: type
    type: string
    value: png
  - domain: com.apple.screencapture
    key: disable-shadow
    type: bool
    value: true

  # Mission Control
  - domain: com.apple.dock
    key: mru-spaces
    type: bool
    value: false

  # Desktop widgets
  - domain: com.apple.WindowManager
    key: EnableWidgetsOnDesktop
    type: bool
    value: false
  - domain: com.apple.WindowManager
    key: StandardHideWidgets
    type: bool
    value: true
  - domain: com.apple.WindowManager
    key: DesktopWidgetStyle
    type: int
    value: 2

  # Menu bar clock
  - domain: com.apple.menuextra.clock
    key: DateFormat
    type: string
    value: "EEE d MMM HH:mm"
