---
- name: Check if mac.dot is already cloned
  ansible.builtin.stat:
    path: "{{ macdot_bare_dir }}/HEAD"
  register: macdot_check
  tags:
    - macdot

- name: Clone mac.dot repository (bare)
  ansible.builtin.command: >
    git clone --bare {{ macdot_repo }} {{ macdot_bare_dir }}
  when: not macdot_check.stat.exists
  changed_when: true
  tags:
    - macdot

- name: Configure macdot to hide untracked files
  ansible.builtin.command: >
    git --git-dir={{ macdot_bare_dir }}
    --work-tree={{ lookup('env', 'HOME') }}
    config status.showUntrackedFiles no
  changed_when: false
  tags:
    - macdot

- name: Checkout dotfiles
  ansible.builtin.command: >
    git --git-dir={{ macdot_bare_dir }}
    --work-tree={{ lookup('env', 'HOME') }}
    checkout
  register: macdot_checkout
  changed_when: false
  failed_when: false
  tags:
    - macdot

- name: Fail if checkout has conflicts
  ansible.builtin.fail:
    msg: "mac.dot checkout has local file conflicts. Resolve or back up existing files and rerun."
  when:
    - macdot_checkout.rc is defined
    - macdot_checkout.rc != 0
  tags:
    - macdot

- name: Add macdot alias to shell profiles
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    line: "alias {{ macdot_alias }}='git --git-dir={{ macdot_bare_dir }} --work-tree={{ lookup('env', 'HOME') }}'"
    create: false
    mode: "0644"
  loop: "{{ shell_profiles }}"
  when: item is exists
  tags:
    - macdot

- name: Add macdot config to shell profiles
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    line: "{{ macdot_alias }} config status.showUntrackedFiles no"
    create: false
    mode: "0644"
  loop: "{{ shell_profiles }}"
  when: item is exists
  tags:
    - macdot
