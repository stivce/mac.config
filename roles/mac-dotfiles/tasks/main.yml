---
- name: Check if mac.dot is already configured
  ansible.builtin.shell: >
    git --git-dir={{ macdot_bare_dir }} config --get status.showUntrackedFiles
  register: macdot_configured
  changed_when: false
  failed_when: false
  tags:
    - macdot

- name: Clone mac.dot repository (bare)
  ansible.builtin.command: >
    git clone --bare {{ macdot_repo }} {{ macdot_bare_dir }}
  when: macdot_configured.rc != 0
  changed_when: true
  tags:
    - macdot

- name: Configure macdot to hide untracked files
  ansible.builtin.command: >
    git --git-dir={{ macdot_bare_dir }}
    --work-tree={{ lookup('env', 'HOME') }}
    config status.showUntrackedFiles no
  changed_when: false
  tags:
    - macdot

- name: Get list of files in repo
  ansible.builtin.command: >
    git --git-dir={{ macdot_bare_dir }} ls-tree -r --name-only HEAD
  register: repo_files
  changed_when: false
  tags:
    - macdot

- name: Backup existing files that conflict
  ansible.builtin.copy:
    src: "{{ lookup('env', 'HOME') }}/{{ item }}"
    dest: "{{ lookup('env', 'HOME') }}/{{ item }}.backup"
    remote_src: true
    mode: preserve
  loop: "{{ repo_files.stdout_lines }}"
  when: item is exists
  tags:
    - macdot

- name: Checkout dotfiles (force)
  ansible.builtin.command: >
    git --git-dir={{ macdot_bare_dir }}
    --work-tree={{ lookup('env', 'HOME') }}
    checkout --force
  changed_when: true
  tags:
    - macdot

- name: Add macdot alias to shell profiles
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    line: "alias {{ macdot_alias }}='git --git-dir={{ macdot_bare_dir }} --work-tree={{ lookup('env', 'HOME') }}'"
    create: false
    mode: "0644"
  loop: "{{ shell_profiles }}"
  when: item is exists
  tags:
    - macdot

- name: Add macdot config to shell profiles
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    line: "{{ macdot_alias }} config status.showUntrackedFiles no"
    create: false
    mode: "0644"
  loop: "{{ shell_profiles }}"
  when: item is exists
  tags:
    - macdot
