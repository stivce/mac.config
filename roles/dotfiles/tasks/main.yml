---
- name: Set home directory path
  ansible.builtin.set_fact:
    user_home: "{{ lookup('env', 'HOME') }}"
  tags:
    - dotfiles

# --- Shared dotfiles ---
- name: Check if shared dotfiles repo exists
  ansible.builtin.stat:
    path: "{{ user_home }}/{{ dotfiles_shared_dir }}/HEAD"
  register: dotfiles_shared_check
  tags:
    - dotfiles

- name: Clone shared dotfiles (bare)
  ansible.builtin.command: >
    git clone --bare {{ dotfiles_shared_repo }}
    {{ user_home }}/{{ dotfiles_shared_dir }}
  when: not dotfiles_shared_check.stat.exists
  changed_when: true
  tags:
    - dotfiles

- name: Configure shared dotfiles to hide untracked files
  ansible.builtin.command: >
    git --git-dir={{ user_home }}/{{ dotfiles_shared_dir }}
    --work-tree={{ user_home }}
    config status.showUntrackedFiles no
  changed_when: false
  tags:
    - dotfiles

- name: Checkout shared dotfiles
  ansible.builtin.command: >
    git --git-dir={{ user_home }}/{{ dotfiles_shared_dir }}
    --work-tree={{ user_home }}
    checkout
  register: dotfiles_shared_checkout
  when: not ansible_check_mode
  changed_when: false
  failed_when: false
  tags:
    - dotfiles

- name: Fail if shared dotfiles checkout has conflicts
  ansible.builtin.fail:
    msg: "Shared dotfiles checkout has local file conflicts. Resolve or back up existing files and rerun."
  when:
    - not ansible_check_mode
    - dotfiles_shared_checkout.rc != 0
  tags:
    - dotfiles

- name: Fetch shared dotfiles
  ansible.builtin.command: >
    git --git-dir={{ user_home }}/{{ dotfiles_shared_dir }}
    fetch origin main
  changed_when: false
  when:
    - dotfiles_shared_check.stat.exists
    - not ansible_check_mode
  tags:
    - dotfiles

- name: Check if shared dotfiles have upstream changes
  ansible.builtin.command: >
    git --git-dir={{ user_home }}/{{ dotfiles_shared_dir }}
    rev-parse HEAD FETCH_HEAD
  register: dotfiles_shared_refs
  changed_when: false
  when:
    - dotfiles_shared_check.stat.exists
    - not ansible_check_mode
  tags:
    - dotfiles

- name: Fast-forward shared dotfiles to FETCH_HEAD
  ansible.builtin.command: >
    git --git-dir={{ user_home }}/{{ dotfiles_shared_dir }}
    --work-tree={{ user_home }}
    merge --ff-only FETCH_HEAD
  register: dotfiles_shared_ff
  when:
    - dotfiles_shared_check.stat.exists
    - dotfiles_shared_refs is defined
    - dotfiles_shared_refs.stdout_lines is defined
    - dotfiles_shared_refs.stdout_lines | length >= 2
    - dotfiles_shared_refs.stdout_lines[0] != dotfiles_shared_refs.stdout_lines[1]
  changed_when: dotfiles_shared_ff.rc == 0
  failed_when: false
  tags:
    - dotfiles

- name: Fail if shared dotfiles fast-forward is not possible
  ansible.builtin.fail:
    msg: "Shared dotfiles cannot be fast-forwarded cleanly. Commit/stash local changes and rerun."
  when:
    - dotfiles_shared_check.stat.exists
    - dotfiles_shared_refs is defined
    - dotfiles_shared_refs.stdout_lines is defined
    - dotfiles_shared_refs.stdout_lines | length >= 2
    - dotfiles_shared_refs.stdout_lines[0] != dotfiles_shared_refs.stdout_lines[1]
    - dotfiles_shared_ff.rc != 0
  tags:
    - dotfiles

# --- OS-specific dotfiles ---
- name: Set OS-specific dotfiles repo
  ansible.builtin.set_fact:
    dotfiles_os_repo: "{{ dotfiles_os_repo_map[ansible_os_family] }}"
