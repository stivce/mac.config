---
ansible_connection: local
ansible_become_pass: "{{ vault_become_pass | default(omit) }}"

homebrew_formulas_extra:
  - openconnect

# Packages from shared_packages that must be installed as Homebrew casks on macOS
homebrew_cask_packages:
  - kitty
  - helium
  - autodesk-fusion
  - affinity

# Packages with different names on macOS (Homebrew)
package_name_map:
  git-delta:
    darwin: delta
  python3:
    darwin: python3
  fd:
    darwin: fd
  gh:
    darwin: gh

homebrew_casks:
  - zen-browser
  - nordvpn
  - lulu
  - appcleaner
  - hiddenbar
  - raycast
  - arc
  - nikitabobko/tap/aerospace
  - ubersicht
  - caffeine
  - displaylink
  - hammerspoon
  - telegram
  - whatsapp
  - iina
  - localsend
  - antigravity
  - theboredteam/boring-notch/boring-notch
  - balenaetcher
  - utm
  - kitty
  - autodesk-fusion
  - affinity
